name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: Build Linux x86_64 (static)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/needle

      - name: Rename binary
        run: mv target/x86_64-unknown-linux-musl/release/needle needle-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: needle-linux-x86_64
          path: needle-x86_64-unknown-linux-gnu

  build-macos:
    name: Build macOS ARM64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Strip binary
        run: strip target/aarch64-apple-darwin/release/needle

      - name: Rename binary
        run: mv target/aarch64-apple-darwin/release/needle needle-aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: needle-macos-aarch64
          path: needle-aarch64-apple-darwin

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: needle-linux-x86_64

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: needle-macos-aarch64

      - name: Make binaries executable
        run: chmod +x needle-*

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          cat << EOF > release_notes.md
          ## NEEDLE ${VERSION}

          ### Installation

          \`\`\`bash
          curl -fsSL https://github.com/jedarden/NEEDLE/releases/latest/download/install.sh | bash
          \`\`\`

          Or download the binary directly for your platform:

          - **Linux x86_64**: [needle-x86_64-unknown-linux-gnu](https://github.com/jedarden/NEEDLE/releases/download/${VERSION}/needle-x86_64-unknown-linux-gnu)
          - **macOS ARM64**: [needle-aarch64-apple-darwin](https://github.com/jedarden/NEEDLE/releases/download/${VERSION}/needle-aarch64-apple-darwin)

          ### Upgrading

          If you already have needle installed:

          \`\`\`bash
          needle upgrade
          \`\`\`

          Or check for updates without installing:

          \`\`\`bash
          needle upgrade --check
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NEEDLE ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: |
            needle-x86_64-unknown-linux-gnu
            needle-aarch64-apple-darwin
            install.sh
          draft: false
          prerelease: false
