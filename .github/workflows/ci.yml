name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build, test, and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "stable"
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-gnu, aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build
        run: cargo build --target x86_64-unknown-linux-gnu

      - name: cargo test
        run: cargo test --target x86_64-unknown-linux-gnu

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check

  cross-compile:
    name: Cross-compile for macOS ARM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with aarch64-apple-darwin target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "stable"
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cross-

      - name: cargo build (aarch64-apple-darwin)
        run: cargo build --target aarch64-apple-darwin
