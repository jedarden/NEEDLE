# NEEDLE Agent Configuration: Claude Code with Anthropic Sonnet
# This configuration defines how NEEDLE invokes Claude Code

# Agent metadata
name: claude-anthropic-sonnet
description: Claude Code with Anthropic Sonnet model
version: "1.0"

# CLI identification
runner: claude          # CLI executable name
provider: anthropic     # Provider for rate limiting
model: sonnet          # Model identifier

# Invocation template
# Variables: ${WORKSPACE}, ${PROMPT}, ${BEAD_ID}, ${BEAD_TITLE}
invoke: |
  cd ${WORKSPACE} && \
  ANTHROPIC_MODEL=claude-sonnet-4-5-20250929 \
  claude --print \
         --dangerously-skip-permissions \
         --output-format json \
         --verbose \
  <<'NEEDLE_PROMPT'
  ${PROMPT}
  NEEDLE_PROMPT

# Input method
input:
  method: heredoc      # heredoc | stdin | file | args
  # For file method:
  # file_path: /tmp/needle-prompt-${BEAD_ID}.txt
  # For args method:
  # arg_flag: --message

# Output parsing
output:
  format: json         # json | text | structured
  # Token extraction regex (if not JSON)
  # token_pattern: "tokens_used: (\\d+)"
  # Exit code interpretation
  success_codes: [0]
  retry_codes: [1]
  fail_codes: [2, 137]

# Rate limits (can override global)
limits:
  requests_per_minute: 60
  max_concurrent: 5

# Cost configuration
# type: pay_per_token | unlimited | use_or_lose
# input_per_1k: cost per 1K input tokens (for pay_per_token)
# output_per_1k: cost per 1K output tokens (for pay_per_token)
cost:
  type: pay_per_token
  # Claude Sonnet 4.5 pricing (as of 2025)
  input_per_1k: 0.003      # $3/1M input tokens
  output_per_1k: 0.015     # $15/1M output tokens
